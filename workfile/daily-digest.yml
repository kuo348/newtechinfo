name: Daily Tech News Digest

on:
  schedule:
    # Run at 9 AM Taiwan Time (1 AM UTC)
    - cron: '0 1 * * *'
  
  # Allow manual triggering for testing
  workflow_dispatch:

jobs:
  collect-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Run news collection script
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.EMAIL_USER }}
        run: python scripts/collect_news.py
      
      - name: Commit digest to repository
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add digests/ || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "📰 Add daily digest - $(date +%Y-%m-%d)" && git push)
        continue-on-error: true
      
      - name: Upload digest as artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: daily-digests
          path: digests/
          retention-days: 30

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: collect-and-send
    if: failure()
    
    steps:
      - name: Workflow failed notification
        run: |
          echo "❌ Daily Tech News Digest workflow failed"
          echo "Please check the logs for details"
